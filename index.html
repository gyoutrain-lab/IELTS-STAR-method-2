<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Consultant: Professional Proficiency Drill</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .app-container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .layer { display: none; } .active { display: block; }
        .error { color: #c0392b; text-decoration: line-through; }
        .correction { color: #27ae60; font-weight: bold; }
        button { padding: 10px 20px; cursor: pointer; background: #2c3e50; color: white; border: none; margin-top: 15px; }
        #feedback { margin-top: 15px; padding: 15px; background: #fff3cd; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 id="step-title">1. Situation (Contextual Nominalization)</h2>
    <div id="drill-box">
        <textarea id="user-input" rows="4" style="width:100%" placeholder="Enter your response here..."></textarea>
    </div>
    
    <div class="controls">
        <button onclick="checkAndNext()">Preview & Next Step</button>
        <button id="submit-btn" style="display:none;" onclick="finalize()">Submit & Get Score</button>
    </div>
    
    <div id="feedback" style="display:none;"></div>
    <button id="tts-btn" style="display:none;" onclick="speakResult()">Play Professional Audio</button>
</div>

<script>
    const steps = ['Situation', 'Task', 'Action', 'Result'];
    let current = 0; let finalResponse = [];

    function checkAndNext() {
        let val = document.getElementById('user-input').value;
        let feedback = document.getElementById('feedback');
        feedback.style.display = 'block';

        // Example Correction Logic (can be expanded)
        if (val.length < 20) {
            feedback.innerHTML = '<span class="error">Too short.</span> <span class="correction">Expand using academic register.</span>';
        } else {
            feedback.innerHTML = '<span class="correction">✓ Competency criteria met.</span>';
            finalResponse.push(val);
            current++;
            if (current < steps.length) {
                document.getElementById('step-title').innerText = (current + 1) + ". " + steps[current];
                document.getElementById('user-input').value = '';
            } else {
                document.getElementById('drill-box').style.display = 'none';
                document.getElementById('submit-btn').style.display = 'block';
            }
        }
    }

    function finalize() {
        let score = 9; // Placeholder logic
        document.getElementById('feedback').innerHTML = `<strong>Final Band Score: ${score}/9</strong><br>Recommendation: Your structure is robust. Maintain this academic register for the speaking exam.`;
        document.getElementById('tts-btn').style.display = 'block';
    }

    function speakResult() {
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(finalResponse.join(". ")));
    }
</script>
</body>
</html>
